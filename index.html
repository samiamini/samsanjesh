<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سام سنجش | آزمایشگاه ری‌گیری و عیارسنجی طلا</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="سام سنجش (Sam Sanjesh / Samsanjesh) — آزمایشگاه ری‌گیری و عیارسنجی طلا در اشنویه، آذربایجان غربی. استعلام آنلاین عیار، وزن و تاریخ انگ آبشده با شماره پاکت.">
<meta name="keywords" content="سام سنجش, Sam Sanjesh, Samsanjesh, عیارسنجی طلا, ری‌گیری طلا, اشنویه, آزمایشگاه طلا">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0f0d09;
    --bg-1:#171310;
    --panel:#1c1712;
    --panel-2:#221b14;
    --gold:#d4af37;
    --gold-soft:#e8c96a;
    --gold-dim:#8a7233;
    --green:#1f5c46;
    --green-bright:#2f8a67;
    --cream:#f3ead3;
    --cream-dim:#c9bc9c;
    --line:#3a2f1f;
    --danger:#b3462c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 50% -10%, #241d13 0%, var(--bg-0) 55%),
      var(--bg-0);
    color:var(--cream);
    font-family:'Vazirmatn', sans-serif;
    min-height:100vh;
    padding:36px 16px 60px;
    display:flex;
    justify-content:center;
  }
  .wrap{width:100%; max-width:640px;}

  /* ---------- HERO / BADGE ---------- */
  .hero{text-align:center; margin-bottom:34px;}
  .badge{width:168px; height:168px; margin:0 auto 18px;}
  .brand-name{
    font-size:30px; font-weight:800; letter-spacing:1px; color:var(--gold-soft);
    margin:6px 0 4px;
  }
  .brand-tag{
    font-size:14.5px; color:var(--cream-dim); font-weight:500;
    letter-spacing:.3px;
  }
  .brand-rule{
    width:56px; height:2px; margin:14px auto 0;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ---------- SEARCH ---------- */
  .search-panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px;
    margin-bottom:22px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .search-row{
    display:flex; align-items:stretch; gap:10px;
  }
  .search-input{
    flex:1;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:0 16px;
    color:var(--cream);
    font-family:inherit;
    font-size:15px;
    text-align:right;
  }
  .search-input::placeholder{color:#8d8064;}
  .search-input:focus{outline:none; border-color:var(--gold-dim);}
  .search-btn{
    background:linear-gradient(160deg, var(--green-bright), var(--green));
    border:none;
    border-radius:12px;
    width:56px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:filter .15s ease, transform .15s ease;
  }
  .search-btn:hover{filter:brightness(1.12);}
  .search-btn:active{transform:scale(.96);}
  .search-btn svg{width:22px; height:22px;}

  .hint{font-size:12.5px; color:var(--cream-dim); margin-top:10px; text-align:center;}

  /* ---------- RESULT ---------- */
  .result{
    display:none;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:14px;
    margin-top:14px;
    padding:18px;
  }
  .result.show{display:block;}
  .result-title{font-size:14px; color:var(--gold-soft); font-weight:700; margin-bottom:12px;}
  .result-row{
    display:flex; justify-content:space-between; padding:9px 0;
    border-bottom:1px dashed var(--line); font-size:14.5px;
  }
  .result-row:last-child{border-bottom:none;}
  .result-row span:first-child{color:var(--cream-dim);}
  .result-row span:last-child{color:var(--cream); font-weight:700;}
  .result.error{border-color:var(--danger);}
  .result.error .result-title{color:#e08363;}
  .loading{text-align:center; color:var(--cream-dim); font-size:13.5px; padding:6px 0; display:none;}
  .loading.show{display:block;}

  /* ---------- CONTACT CARDS ---------- */
  .cards{
    display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .card-icon{
    width:38px; height:38px; flex-shrink:0;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
  }
  .card-icon svg{width:18px; height:18px; stroke:var(--green-bright);}
  .card-label{font-size:12px; color:var(--cream-dim); margin-top:4px;}
  .card-numbers{font-size:14px; font-weight:700; color:var(--gold-soft); line-height:1.6; direction:ltr; text-align:right;}

  /* ---------- ADDRESS ---------- */
  .address{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
    display:flex; align-items:flex-start; gap:10px;
    font-size:13.5px; color:var(--cream-dim); line-height:1.9;
    margin-bottom:22px;
  }
  .address svg{width:20px; height:20px; flex-shrink:0; margin-top:2px; stroke:var(--green-bright);}

  footer{text-align:center; font-size:11.5px; color:#6b6047;}

  @media (max-width:420px){
    .cards{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="badge">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="97" fill="#171310" stroke="#d4af37" stroke-width="2"/>
        <circle cx="100" cy="100" r="86" fill="none" stroke="#8a7233" stroke-width="1"/>
        <g fill="none" stroke="#d4af37" stroke-width="1.4">
          <circle cx="100" cy="100" r="78" stroke-dasharray="1 6" stroke-linecap="round"/>
        </g>
        <text x="100" y="88" text-anchor="middle" font-family="Vazirmatn, sans-serif" font-weight="800" font-size="30" fill="#e8c96a">سام</text>
        <text x="100" y="126" text-anchor="middle" font-family="Vazirmatn, sans-serif" font-weight="800" font-size="30" fill="#e8c96a">سنجش</text>
        <line x1="60" y1="102" x2="140" y2="102" stroke="#8a7233" stroke-width="1"/>
      </svg>
    </div>
    <div class="brand-name">سام سنجش</div>
    <div class="brand-tag">آزمایشگاه ری‌گیری و عیارسنجی طلا</div>
    <div class="brand-rule"></div>
  </div>

  <div class="search-panel">
    <div class="search-row">
      <button class="search-btn" id="searchBtn" aria-label="جستجو">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f3ead3" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <input class="search-input" id="codeInput" type="text" inputmode="numeric" placeholder="کد پاکت را وارد کنید" />
    </div>
    <div class="loading" id="loading">در حال جستجو…</div>
    <div class="hint">شماره انگ آبشده یا پاکت طلای خود را وارد کنید</div>

    <div class="result" id="result">
      <div class="result-title" id="resultTitle">نتیجه استعلام</div>
      <div id="resultBody"></div>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <div>
        <div class="card-numbers">09357700930</div>
      </div>
      <div>
        <div class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/></svg></div>
        <div class="card-label">تلفن همراه</div>
      </div>
    </div>
    <div class="card">
      <div>
        <div class="card-numbers">044-44632258</div>
      </div>
      <div>
        <div class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
        <div class="card-label">تلفن ثابت</div>
      </div>
    </div>
  </div>

  <div class="address">
    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    <div>آذربایجان غربی، شهرستان اشنویه، بالاتر از بانک کشاورزی، پاساژ حاج سلطان — سام سنجش</div>
  </div>

  <footer>سام سنجش | Sam Sanjesh | Samsanjesh &copy; <span id="year"></span></footer>
</div>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

/* =====================================================================
   تنظیمات اتصال به گوگل‌شیت — این بخش را طبق راهنمای زیر پیام تکمیل کن
   ===================================================================== */
const SHEET_ID = "1Chholcv1miZ8zrqoDXxn6SA9_y6li8DSP1jR9TOT27U";
const GID = "0"; // شماره برگه از انتهای لینک (gid=0)

// ترتیب ستون‌ها در شیت باید دقیقا این باشد:
// A: کد پاکت | B: عیار | C: وزن (گرم) | D: تاریخ

function buildUrl(){
  // کل جدول را می‌گیریم و تطبیق را خودمان در جاوااسکریپت انجام می‌دهیم
  // تا مشکل نوع‌داده (متن در برابر عدد) در کوئری سمت گوگل پیش نیاید.
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;
}

const input = document.getElementById('codeInput');
const btn = document.getElementById('searchBtn');
const resultBox = document.getElementById('result');
const resultTitle = document.getElementById('resultTitle');
const resultBody = document.getElementById('resultBody');
const loading = document.getElementById('loading');

function showError(msg){
  resultBox.className = 'result show error';
  resultTitle.textContent = 'خطا';
  resultBody.innerHTML = `<div class="result-row"><span>${msg}</span><span></span></div>`;
}

function formatCell(raw){
  if(raw === null || raw === undefined) return null;
  // اگر گوگل سلول را به‌عنوان تاریخ واقعی تشخیص داده باشد،
  // خروجی به‌صورت "Date(year,monthIndex,day)" برمی‌گردد (ماه از ۰ شروع می‌شود)
  if(typeof raw === 'string'){
    const m = raw.match(/^Date\((\d+),(\d+),(\d+)(?:,\d+,\d+,\d+)?\)$/);
    if(m){
      const y = m[1];
      const mo = String(parseInt(m[2],10) + 1).padStart(2,'0');
      const d = String(parseInt(m[3],10)).padStart(2,'0');
      return `${y}/${mo}/${d}`;
    }
  }
  return raw;
}

function showResult(rowValues){
  const [code, karat, weight, date] = rowValues.map(formatCell);
  resultBox.className = 'result show';
  resultTitle.textContent = `نتیجه استعلام — کد ${code ?? ''}`;
  resultBody.innerHTML = `
    <div class="result-row"><span>عیار</span><span>${karat ?? '—'}</span></div>
    <div class="result-row"><span>وزن</span><span>${weight ?? '—'} گرم</span></div>
    <div class="result-row"><span>تاریخ</span><span>${date ?? '—'}</span></div>
  `;
}

async function runSearch(){
  const code = input.value.trim();
  if(!code){ return; }
  if(SHEET_ID === "PASTE_YOUR_GOOGLE_SHEET_ID_HERE"){
    showError('شیت هنوز وصل نشده. راهنمای پیام قبل را دنبال کن و SHEET_ID را در کد قرار بده.');
    return;
  }
  resultBox.className = 'result';
  loading.className = 'loading show';
  try{
    const res = await fetch(buildUrl());
    const text = await res.text();
    const json = JSON.parse(text.substring(47, text.length - 2)); // strip google's JS wrapper
    const rows = json.table.rows || [];
    // ردیف اول را که دستی وارد کردیم (تیتر) بگذر و بین بقیه دنبال کد بگرد
    const match = rows.find(r => {
      const cellA = r.c && r.c[0] ? String(r.c[0].v).trim() : '';
      return cellA === code;
    });
    if(!match){
      showError('کدی با این شماره پاکت پیدا نشد.');
    } else {
      const values = match.c.map(c => c ? c.v : null);
      showResult(values);
    }
  } catch(err){
    showError('خطا در دریافت اطلاعات. کنسول مرورگر (F12) را برای متن دقیق خطا بررسی کن.');
    console.error(err);
  } finally {
    loading.className = 'loading';
  }
}

btn.addEventListener('click', runSearch);
input.addEventListener('keydown', e => { if(e.key === 'Enter') runSearch(); });
</script>
</body>
</html>
